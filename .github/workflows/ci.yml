name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tmkeen
          POSTGRES_PASSWORD: tmkeen_ci
          POSTGRES_DB: tmkeen_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://tmkeen:tmkeen_ci@localhost:5432/tmkeen_test?schema=public
      SESSION_SECRET: ci-test-secret
      UPLOAD_DIR: ./uploads

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npx prisma migrate deploy

      - run: npm run build
